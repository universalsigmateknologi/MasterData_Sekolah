<!-- OVERLAY (Mobile) -->
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40 hidden md:hidden sidebar-transition opacity-0" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-64 bg-white border-r border-border-light flex flex-col sidebar-transition -translate-x-full md:translate-x-0 md:sticky md:top-0 md:h-screen md:z-30 shadow-sm md:shadow-none">
    <!-- Sidebar Header -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-border-light flex-shrink-0">
      <a href="#" class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-neutral-900 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </div>
        <span class="font-semibold text-lg tracking-tight text-neutral-900">Minima</span>
      </a>
      <button onclick="closeSidebar()" class="md:hidden p-1.5 rounded-lg hover:bg-neutral-100 transition-colors text-neutral-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Navigation Scrollable -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      {% block sidebar_nav %}
      <a href="{% url 'siswa:index' %}" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-neutral-500 hover:bg-neutral-100 hover:text-neutral-700 transition-all duration-200 group relative"><span class="nav-indicator absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-5 bg-neutral-900 rounded-full opacity-0 transition-opacity"></span><svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg><span>Data Siswa</span></a>
      {% endblock %}
    </nav>

    <!-- Sidebar Footer -->
    <div class="border-t border-border-light p-4 flex-shrink-0">
      <div class="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-neutral-100 transition-colors cursor-pointer">
        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=40&h=40&fit=crop&crop=face&q=80" alt="User avatar" class="w-9 h-9 rounded-full object-cover ring-2 ring-neutral-200 shrink-0" loading="lazy">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-neutral-800 truncate">{{ user.username }}</p>
          <p class="text-xs text-neutral-400 truncate">{{ user.email }}</p>
        </div>
        <form method="post" action="{% url 'auth:logout' %}">
    {% csrf_token %}
    <button type="submit" class="flex items-center gap-2 p-1 rounded-lg hover:bg-red-50 hover:text-red-600 transition-colors text-neutral-400 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
    </button>
</form>
      </div>
    </div>
  </aside>
